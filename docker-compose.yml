services:
  tabbit2api:
    image: ghcr.io/juneix/tabbit2api
    container_name: tabbit2api
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - PORT=8800
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8800/v1/models')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
