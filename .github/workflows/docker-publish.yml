name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 添加权限声明，确保可以推送到 GHCR
permissions:
  packages: write
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      # 拉取当前仓库代码
      - name: Checkout
        uses: actions/checkout@v7

      # 启用跨架构模拟，支持构建 arm64 镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # 初始化 Docker Buildx 多平台构建环境
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 登录 GHCR，使用 GitHub 内置令牌推送镜像
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 登录 Docker Hub，使用仓库 Secrets 中的账号信息
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 转换仓库拥有者名称为小写（避免 GHCR 报错）
      - name: Lowercase repo owner
        id: lowercase
        run: echo "repo_owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      # 提取元数据，自动生成 latest、版本号、sha 等标签
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ steps.lowercase.outputs.repo_owner }}/tabbit2api
            ${{ secrets.DOCKER_USER }}/tabbit2api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # 构建并推送 amd64/arm64 两个平台镜像
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
